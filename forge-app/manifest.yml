app:
  name: account-team-hub
  title: Account Team Hub
  description: Real-time collaboration surface for account teams powered by Confluence, Jira, Google Calendar, and Slack
  key: account-team-hub
  runtime:
    name: nodejs20.x

modules:
  # Confluence macro modules - Custom UI dashboard components
  confluence:macro:
    - key: account-hub-macro
      title: Account Hub Dashboard
      description: Main account team hub dashboard showing metrics, activities, and team info
      resource: account-hub-resource
      render: native
      properties:
        accountId:
          required: true
          type: string
          description: The account ID to display in this hub

    - key: gray-area-queue-macro
      title: Gray Area Queue
      description: Displays unclaimed tasks requiring immediate attention
      resource: account-hub-resource
      render: native
      properties:
        maxItems:
          type: string
          description: Maximum number of items to display

    - key: focus-areas-macro
      title: Focus Areas
      description: Inline-editable focus areas stored in page properties
      resource: account-hub-resource
      render: native
      properties:
        focusAreaIds:
          type: string
          description: Comma-separated list of focus area IDs

  # Jira global page module for cross-account dashboard
  jira:globalPage:
    - key: portfolio-view
      title: Account Portfolio View
      description: Cross-account triage dashboard showing all account health and status
      resource: portfolio-view-resource

  # Web triggers for external integrations
  webtrigger:
    - key: google-calendar-sync
      handler: googleCalendarSyncHandler
      description: Receives Google Calendar push notifications and syncs to Confluence

    - key: slack-pin-listener
      handler: slackPinListenerHandler
      description: Receives Slack pin events and stores them in Forge Storage

  # Backend function for resolvers and webtrigger handlers
  function:
    - key: resolverHandler
      handler: src/resolvers/index.handler

    - key: googleCalendarSyncHandler
      handler: src/webtriggers/googleCalendarSync.handler

    - key: slackPinListenerHandler
      handler: src/webtriggers/slackPinListener.handler

resources:
  - key: account-hub-resource
    path: static/account-hub

  - key: portfolio-view-resource
    path: static/portfolio-view

permissions:
  content:
    - read
    - write
  storage: {}

external:
  fetch:
    - googleapis.com
    - slack.com
    - api.loom.com
