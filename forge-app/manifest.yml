app:
  runtime:
    name: nodejs20.x
  id: ari:cloud:ecosystem::app/568930e6-2da4-4789-9070-666ef510942f

modules:
  # Confluence macro modules - Custom UI (React) dashboard components
  macro:
    - key: account-hub-macro
      title: Account Hub Dashboard
      description: Main account team hub dashboard showing metrics, activities, and team info
      resource: account-hub-resource
      resolver:
        function: resolver-fn
      properties:
        accountId:
          required: true
          type: string
          description: The account ID to display in this hub

    - key: gray-area-queue-macro
      title: Gray Area Queue
      description: Displays unclaimed tasks requiring immediate attention
      resource: account-hub-resource
      resolver:
        function: resolver-fn
      properties:
        maxItems:
          type: string
          description: Maximum number of items to display

    - key: focus-areas-macro
      title: Focus Areas
      description: Inline-editable focus areas stored in page properties
      resource: account-hub-resource
      resolver:
        function: resolver-fn
      properties:
        focusAreaIds:
          type: string
          description: Comma-separated list of focus area IDs

  # Jira global page module for cross-account dashboard
  jira:globalPage:
    - key: portfolio-view
      title: Account Portfolio View
      description: Cross-account triage dashboard showing all account health and status
      resource: portfolio-view-resource
      resolver:
        function: resolver-fn

  # Web triggers for external integrations
  webtrigger:
    - key: google-calendar-sync
      function: gcal-sync-fn

    - key: slack-pin-listener
      function: slack-pin-fn

  # Backend function for resolvers and webtrigger handlers
  function:
    - key: resolver-fn
      handler: resolvers/index.default

    - key: gcal-sync-fn
      handler: webtriggers/googleCalendarSync.handler

    - key: slack-pin-fn
      handler: webtriggers/slackPinListener.handler

resources:
  - key: account-hub-resource
    path: static/account-hub/build

  - key: portfolio-view-resource
    path: static/portfolio-view/build

permissions:
  scopes:
    - storage:app
    - read:confluence-content.all
    - write:confluence-content
    - read:jira-work
    - write:jira-work
  external:
    fetch:
      backend:
        - https://www.googleapis.com
        - https://slack.com
        - https://api.loom.com
