<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Hub</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f5f5;
        color: #333;
      }

      #root {
        width: 100%;
        min-height: 600px;
      }

      /* Loading state */
      .loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        font-size: 16px;
        color: #666;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #2684ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-right: 12px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Error state */
      .error-container {
        padding: 24px;
        background-color: #fff;
        border-left: 4px solid #ae2a19;
        border-radius: 4px;
        margin: 16px 0;
      }

      .error-container h3 {
        color: #ae2a19;
        margin-bottom: 8px;
      }

      .error-container p {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="src/index.jsx"></script>
  </body>
</html>
